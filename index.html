<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Daily Schedule</title>
<meta name="theme-color" content="#2F5D62" />
<meta name="description" content="Your daily routine and tasks, time-blocked." />

<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Schedule" />

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #FAF9F5;
    color: #23262B;
  }
  .wrap { max-width: 440px; margin: 0 auto; padding: 32px 20px 96px; }
  .eyebrow { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #2F5D62; margin: 0 0 4px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 24px; }
  .progress-row { display: flex; justify-content: space-between; font-family: ui-monospace, monospace; font-size: 12px; color: #6B7280; margin-bottom: 6px; }
  .progress-track { height: 6px; border-radius: 999px; background: #E7E3DA; overflow: hidden; margin-bottom: 32px; }
  .progress-fill { height: 100%; background: #D9A441; border-radius: 999px; transition: width .4s; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .section-title svg { color: #2F5D62; }
  .add-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; color: #2F5D62; background: #EAF0EF; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  .empty { font-size: 14px; color: #9C9686; padding: 8px 0 12px; margin: 0; }
  .form-card { padding: 12px; border: 1px solid #E7E3DA; border-radius: 10px; background: white; margin-bottom: 16px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  input[type="time"], input[type="text"] { font-size: 14px; border: 1px solid #E7E3DA; border-radius: 6px; padding: 7px 9px; width: 100%; font-family: inherit; background: white; color: #23262B; }
  input[type="time"] { font-family: ui-monospace, monospace; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-ghost { background: none; border: none; font-size: 12px; color: #6B7280; padding: 6px 10px; cursor: pointer; }
  .btn-primary { background: #2F5D62; color: white; border: none; font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
  .timeline { position: relative; padding-left: 16px; margin-bottom: 32px; }
  .rail { position: absolute; left: 5px; top: 4px; bottom: 4px; width: 1px; background: #D8D2C4; }
  .block-row { position: relative; display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .dot { position: absolute; left: -16px; top: 6px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #D8D2C4; background: #FAF9F5; }
  .dot.done { border-color: #2F5D62; background: #2F5D62; }
  .block-card { flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px; border-radius: 10px; border: 1px solid #E7E3DA; background: white; text-align: left; cursor: pointer; }
  .block-card.done { background: #F1EFE8; }
  .block-time { display: block; font-family: ui-monospace, monospace; font-size: 11px; color: #2F5D62; margin-bottom: 2px; }
  .block-label { font-size: 14px; }
  .block-label.done { color: #9C9686; text-decoration: line-through; }
  .del-btn { background: none; border: none; color: #D6D0C4; padding: 6px; cursor: pointer; flex-shrink: 0; }
  .del-btn:hover { color: #E0827A; }
  .now-marker { display: flex; align-items: center; gap: 8px; margin: 0 0 12px -16px; }
  .now-dot { width: 10px; height: 10px; border-radius: 50%; background: #D9A441; flex-shrink: 0; }
  .now-line { flex: 1; height: 1px; background: #D9A441; }
  .now-label { font-family: ui-monospace, monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #8A5F0E; background: #F6E6C4; padding: 2px 6px; border-radius: 4px; }
  .task-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; border: 1px solid #E7E3DA; background: white; margin-bottom: 8px; }
  .task-row.done { background: #F1EFE8; }
  .checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1px solid #D8D2C4; background: transparent; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .checkbox.done { border-color: #2F5D62; background: #2F5D62; }
  .task-text { font-size: 14px; flex: 1; }
  .task-text.done { color: #9C9686; text-decoration: line-through; }
  .task-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .task-add-row input { flex: 1; }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="dateLabel"></p>
  <h1>Today's plan</h1>

  <div class="progress-row"><span id="dayProgLabel"></span><span id="doneProgLabel"></span></div>
  <div class="progress-track"><div class="progress-fill" id="dayProgFill"></div></div>

  <div class="section-head">
    <div class="section-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Routine
    </div>
    <button class="add-btn" id="toggleAddBlock">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add
    </button>
  </div>

  <div class="form-card" id="addBlockForm" style="display:none">
    <div class="form-row">
      <input type="time" id="blockStart" value="07:00" />
      <input type="time" id="blockEnd" value="07:30" />
    </div>
    <input type="text" id="blockLabel" placeholder="What happens then?" style="margin-bottom:8px" />
    <div class="form-actions">
      <button class="btn-ghost" id="cancelBlock">Cancel</button>
      <button class="btn-primary" id="saveBlock">Save block</button>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="section-head">
    <div class="section-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg>
      Today's tasks
    </div>
    <button class="add-btn" id="toggleAddTask">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add
    </button>
  </div>

  <div class="task-add-row" id="addTaskForm" style="display:none">
    <input type="text" id="taskText" placeholder="One-off thing to do today" />
    <button class="btn-primary" id="saveTask">Add</button>
  </div>

  <div id="taskList"></div>
</div>

<script>
// ---------- storage helpers ----------
function todayKey(d) {
  d = d || new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function loadJSON(key, fallback) {
  try {
    var v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function minutesOf(t) { var p = t.split(":").map(Number); return p[0] * 60 + p[1]; }
function fmtTime(t) {
  var p = t.split(":").map(Number), h = p[0], m = p[1];
  var period = h >= 12 ? "PM" : "AM";
  var h12 = h % 12 === 0 ? 12 : h % 12;
  return h12 + ":" + String(m).padStart(2, "0") + " " + period;
}

// ---------- state ----------
var routine = loadJSON("routine", []);
var dayData = loadJSON("day:" + todayKey(), { tasks: [], completed: {} });
var tasks = dayData.tasks || [];
var completed = dayData.completed || {};

function persist() {
  saveJSON("routine", routine);
  saveJSON("day:" + todayKey(), { tasks: tasks, completed: completed });
}

// ---------- render ----------
var checkSVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2F5D62" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
var checkWhiteSVG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
var trashSVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16Z"/></svg>';

function render() {
  var now = new Date();
  document.getElementById("dateLabel").textContent = now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });

  var nowMin = now.getHours() * 60 + now.getMinutes();
  var dayProgress = Math.round((nowMin / (24 * 60)) * 100);
  document.getElementById("dayProgLabel").textContent = "Day progress · " + dayProgress + "%";
  document.getElementById("dayProgFill").style.width = dayProgress + "%";

  var sorted = routine.slice().sort(function (a, b) { return minutesOf(a.start) - minutesOf(b.start); });
  var doneBlocks = sorted.filter(function (b) { return completed[b.id]; }).length;
  var totalItems = sorted.length + tasks.length;
  var doneItems = doneBlocks + tasks.filter(function (t) { return t.done; }).length;
  var completionPct = totalItems ? Math.round((doneItems / totalItems) * 100) : 0;
  document.getElementById("doneProgLabel").textContent = completionPct + "% done";

  var nowInsertIndex = sorted.findIndex(function (b) { return minutesOf(b.start) > nowMin; });
  if (nowInsertIndex === -1) nowInsertIndex = sorted.length;

  var tl = document.getElementById("timeline");
  tl.innerHTML = "";
  var railDiv = document.createElement("div");
  railDiv.className = "rail";
  tl.appendChild(railDiv);

  if (sorted.length === 0) {
    var p = document.createElement("p");
    p.className = "empty";
    p.textContent = "No routine yet — add the times that anchor your day.";
    tl.appendChild(p);
  }

  function nowMarkerEl() {
    var d = document.createElement("div");
    d.className = "now-marker";
    d.innerHTML = '<span class="now-dot"></span><span class="now-line"></span><span class="now-label">now</span>';
    return d;
  }

  sorted.forEach(function (b, i) {
    if (i === nowInsertIndex) tl.appendChild(nowMarkerEl());
    var row = document.createElement("div");
    row.className = "block-row";
    var isDone = !!completed[b.id];
    row.innerHTML =
      '<span class="dot' + (isDone ? " done" : "") + '"></span>' +
      '<button class="block-card' + (isDone ? " done" : "") + '" data-id="' + b.id + '">' +
        '<div><span class="block-time">' + fmtTime(b.start) + " – " + fmtTime(b.end) + '</span>' +
        '<span class="block-label' + (isDone ? " done" : "") + '">' + escapeHTML(b.label) + '</span></div>' +
        (isDone ? checkSVG : "") +
      '</button>' +
      '<button class="del-btn" data-del="' + b.id + '">' + trashSVG + '</button>';
    tl.appendChild(row);
  });
  if (nowInsertIndex === sorted.length) tl.appendChild(nowMarkerEl());

  tl.querySelectorAll("[data-id]").forEach(function (el) {
    el.addEventListener("click", function () {
      var id = el.getAttribute("data-id");
      completed[id] = !completed[id];
      persist(); render();
    });
  });
  tl.querySelectorAll("[data-del]").forEach(function (el) {
    el.addEventListener("click", function () {
      var id = el.getAttribute("data-del");
      routine = routine.filter(function (b) { return b.id !== id; });
      persist(); render();
    });
  });

  var taskList = document.getElementById("taskList");
  taskList.innerHTML = "";
  if (tasks.length === 0) {
    var ep = document.createElement("p");
    ep.className = "empty";
    ep.textContent = "Nothing here yet. Add tasks that don't need a fixed time.";
    taskList.appendChild(ep);
  }
  tasks.forEach(function (t) {
    var row = document.createElement("div");
    row.className = "task-row" + (t.done ? " done" : "");
    row.innerHTML =
      '<button class="checkbox' + (t.done ? " done" : "") + '" data-tid="' + t.id + '">' + (t.done ? checkWhiteSVG : "") + '</button>' +
      '<span class="task-text' + (t.done ? " done" : "") + '">' + escapeHTML(t.text) + '</span>' +
      '<button class="del-btn" data-tdel="' + t.id + '">' + trashSVG + '</button>';
    taskList.appendChild(row);
  });
  taskList.querySelectorAll("[data-tid]").forEach(function (el) {
    el.addEventListener("click", function () {
      var id = el.getAttribute("data-tid");
      tasks = tasks.map(function (t) { return t.id === id ? Object.assign({}, t, { done: !t.done }) : t; });
      persist(); render();
    });
  });
  taskList.querySelectorAll("[data-tdel]").forEach(function (el) {
    el.addEventListener("click", function () {
      var id = el.getAttribute("data-tdel");
      tasks = tasks.filter(function (t) { return t.id !== id; });
      persist(); render();
    });
  });
}

function escapeHTML(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ---------- form wiring ----------
document.getElementById("toggleAddBlock").addEventListener("click", function () {
  var f = document.getElementById("addBlockForm");
  f.style.display = f.style.display === "none" ? "block" : "none";
});
document.getElementById("cancelBlock").addEventListener("click", function () {
  document.getElementById("addBlockForm").style.display = "none";
});
document.getElementById("saveBlock").addEventListener("click", function () {
  var start = document.getElementById("blockStart").value;
  var end = document.getElementById("blockEnd").value;
  var label = document.getElementById("blockLabel").value.trim();
  if (!label) return;
  routine.push({ id: uid(), start: start, end: end, label: label });
  document.getElementById("blockLabel").value = "";
  document.getElementById("addBlockForm").style.display = "none";
  persist(); render();
});

document.getElementById("toggleAddTask").addEventListener("click", function () {
  var f = document.getElementById("addTaskForm");
  f.style.display = f.style.display === "none" ? "flex" : "none";
  if (f.style.display === "flex") document.getElementById("taskText").focus();
});
function addTask() {
  var input = document.getElementById("taskText");
  var text = input.value.trim();
  if (!text) return;
  tasks.push({ id: uid(), text: text, done: false });
  input.value = "";
  document.getElementById("addTaskForm").style.display = "none";
  persist(); render();
}
document.getElementById("saveTask").addEventListener("click", addTask);
document.getElementById("taskText").addEventListener("keydown", function (e) {
  if (e.key === "Enter") addTask();
});

// ---------- boot ----------
render();
setInterval(render, 30000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js").catch(function () {});
}
</script>
</body>
</html>
